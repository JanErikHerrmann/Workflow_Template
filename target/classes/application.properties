spring.application.name=Template_Workflow
spring.datasource.url=jdbc:postgresql://localhost:5432/MasterThesis_Workflow
spring.datasource.username=postgres
spring.datasource.password=postgres_postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Let Flyway manage the schema; set ddl-auto to validate to avoid Hibernate auto-changing schema
spring.jpa.hibernate.ddl-auto=validate

# Flyway configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# If true, the application will run the V1__init.sql migration at startup using a custom initializer
app.db.init=false

# Let Spring run schema.sql on startup
# Disabled because database is initialized manually; avoid executing schema.sql which can cause dollar-quote parsing issues
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

# Optional: show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
